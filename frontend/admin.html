<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BuildWise | Panel administracyjny</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script defer src="/static/admin.js"></script>
  </head>
  <body class="admin-body">
    <aside class="sidebar">
      <a class="brand" href="/">BuildWise</a>
      <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#clients">Klienci</a>
        <a href="#inquiries">Zapytania</a>
        <a href="#offers">Oferty</a>
        <a href="#users">Użytkownicy</a>
        <a href="#activity">Aktywność</a>
        <a href="#audit">Audit</a>
      </nav>
    </aside>

    <main class="admin-main">
      <section id="login-panel" class="login-panel">
        <h1>Logowanie</h1>
        <form id="login-form" class="form-card compact">
          <label>Login<input name="login" autocomplete="username" required /></label>
          <label>Hasło<input name="password" type="password" autocomplete="current-password" required /></label>
          <button class="button primary" type="submit">Zaloguj</button>
          <p id="login-status" class="status"></p>
        </form>
      </section>

      <section id="admin-content" class="hidden">
        <div class="topbar">
          <div>
            <p class="eyebrow">Panel administracyjny</p>
            <h1>Analiza aktywności klientów</h1>
            <p id="admin-status" class="status" role="status" aria-live="polite"></p>
          </div>
          <button id="logout" class="button secondary">Wyloguj</button>
        </div>

        <section id="dashboard" class="section">
          <div id="kpi-grid" class="grid five"></div>
          <div class="split">
            <div class="card">
              <h3>Najczęściej odwiedzane strony</h3>
              <div id="top-pages"></div>
            </div>
            <div class="card">
              <h3>Alerty</h3>
              <div id="alerts"></div>
            </div>
          </div>
        </section>

        <section id="clients" class="section">
          <div class="section-row">
            <h2>Klienci</h2>
            <form id="client-search-form" class="inline-form">
              <input id="client-search" name="q" type="search" minlength="2" placeholder="Szukaj klienta" />
              <button class="button secondary" type="submit">Szukaj</button>
              <button id="client-search-reset" class="button secondary" type="button">Wyczyść</button>
            </form>
          </div>
          <form id="client-form" class="inline-form admin-form">
            <input name="name" placeholder="Nazwa klienta" minlength="2" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="phone" placeholder="Telefon" />
            <button class="button primary" type="submit">Dodaj klienta</button>
          </form>
          <div id="clients-table" class="table-shell"></div>
          <div id="clients-pager" class="pager"></div>
          <div id="client-timeline" class="card timeline"></div>
        </section>

        <section id="inquiries" class="section">
          <div class="section-row">
            <h2>Zapytania ofertowe</h2>
            <select id="inquiry-filter">
              <option value="">Wszystkie</option>
              <option value="new">Nowe</option>
              <option value="in_progress">W trakcie</option>
              <option value="offer_sent">Oferta wysłana</option>
              <option value="closed">Zamknięte</option>
            </select>
          </div>
          <form id="inquiry-form" class="inline-form admin-form">
            <input name="client_id" type="number" min="1" placeholder="ID klienta" required />
            <input name="message" placeholder="Treść zapytania" minlength="5" required />
            <select name="status">
              <option value="new">Nowe</option>
              <option value="in_progress">W trakcie</option>
              <option value="offer_sent">Oferta wysłana</option>
              <option value="closed">Zamknięte</option>
            </select>
            <button class="button primary" type="submit">Dodaj zapytanie</button>
          </form>
          <div id="inquiries-table" class="table-shell"></div>
          <div id="inquiries-pager" class="pager"></div>
        </section>

        <section id="offers" class="section">
          <h2>Oferty</h2>
          <form id="offer-form" class="inline-form">
            <input name="inquiry_id" type="number" placeholder="Inquiry ID" required />
            <input name="value" type="number" min="0" step="0.01" placeholder="Wartość" required />
            <select name="status">
              <option value="draft">Szkic</option>
              <option value="sent">Wysłana</option>
              <option value="accepted">Zaakceptowana</option>
              <option value="rejected">Odrzucona</option>
            </select>
            <button class="button primary" type="submit">Dodaj ofertę</button>
          </form>
          <div id="offers-table" class="table-shell"></div>
          <div id="offers-pager" class="pager"></div>
        </section>

        <section id="users" class="section">
          <h2>Użytkownicy</h2>
          <form id="user-form" class="inline-form admin-form">
            <input name="login" minlength="3" maxlength="80" placeholder="Login" required />
            <input name="password" type="password" minlength="8" maxlength="120" placeholder="Hasło" required />
            <select name="role">
              <option value="sales">Sales</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
            <button class="button primary" type="submit">Dodaj użytkownika</button>
          </form>
          <div id="users-table" class="table-shell"></div>
        </section>

        <section id="activity" class="section">
          <h2>Logi aktywności</h2>
          <div id="activity-table" class="table-shell"></div>
          <div id="activity-pager" class="pager"></div>
        </section>

        <section id="audit" class="section">
          <h2>Audit log</h2>
          <div id="audit-table" class="table-shell"></div>
          <div id="audit-pager" class="pager"></div>
        </section>
      </section>
    </main>
  </body>
</html>
