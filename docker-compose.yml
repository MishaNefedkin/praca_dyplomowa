services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: construction_crm
      POSTGRES_USER: construction_user
      POSTGRES_PASSWORD: construction_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U construction_user -d construction_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://construction_user:construction_password@db:5432/construction_crm
      SECRET_KEY: change-this-secret-before-production
      ADMIN_LOGIN: admin
      ADMIN_PASSWORD: admin12345
      SEED_SAMPLE_DATA: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
